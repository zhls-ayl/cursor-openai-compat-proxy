services:
  cursor-openai-compat-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-openai-compat-proxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/healthz', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

